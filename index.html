<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما فور يو | مشاهدة أحدث الأفلام والمسلسلات مجاناً</title>
    <!-- استدعاء خط Cairo وتصميم خارجي سريع -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: #0f1115;
            color: #ffffff;
            padding-bottom: 50px;
        }
        header {
            background: linear-gradient(180deg, #e50914 0%, #0f1115 100%);
            padding: 40px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        header p {
            color: #ccc;
            font-size: 1.1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .movie-card {
            background-color: #1c1f26;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4);
        }
        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }
        .movie-info {
            padding: 12px;
        }
        .movie-title {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #aaa;
        }
        .rating {
            color: #ffc107;
            font-weight: bold;
        }
        /* تصميم النافذة المنبثقة لقفل الـ CPA */
        .locker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .locker-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .locker-box {
            background: #1c1f26;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid #e50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }
        .locker-box h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #e50914;
        }
        .locker-box p {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .cpa-btn {
            display: inline-block;
            background-color: #e50914;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            font-size: 1.1rem;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .cpa-btn:hover {
            background-color: #b80710;
        }
        .close-locker {
            margin-top: 15px;
            display: inline-block;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>سينما فور يو</h1>
        <p>شاهد وحمّل أحدث الأفلام والمسلسلات الحصرية بجودة عالية HD</p>
    </header>

    <div class="container">
        <h2 style="border-right: 4px solid #e50914; padding-right: 10px;">الأكثر تداولاً وإقبالاً الآن</h2>
        <div class="movies-grid" id="moviesGrid">
            <!-- الأفلام سيتم توليدها هنا تلقائياً عبر السكربت -->
        </div>
    </div>

    <!-- نافذة قفل المحتوى CPA Locker -->
    <div class="locker-overlay" id="lockerOverlay">
        <div class="locker-box">
            <h2 id="lockedTitle">محتوى مقفل!</h2>
            <p>لمشاهدة أو تحميل الفيلم بجودة عالية وبدون إعلانات، يرجى تأكيد هويتك أولاً عبر إكمال أحد التحققات السريعة (يستغرق دقيقة واحدة فقط).</p>
            
            <!-- ضع رابط عرض الـ CPA أو رابط الـ Content Locker الخاص بك هنا -->
            <button class="cpa-btn" onclick="startCPALocker()">شاهـد الآن بجودة HD</button>
            
            <div class="close-locker" onclick="toggleLocker(false)">إغلاق</div>
        </div>
    </div>

    <script>
        // مفتاح API مجاني جاهز ومخصص لجلب البيانات (Trending Movies & Shows)
        const apiKey = '844111cc2f16e6d766747b0e45cfb2a2'; 
        const grid = document.getElementById('moviesGrid');
        const overlay = document.getElementById('lockerOverlay');
        const lockedTitle = document.getElementById('lockedTitle');

        // جلب الأفلام والمسلسلات الرائجة تلقائياً
        async function fetchContent() {
            try {
                // جلب الأفلام والمسلسلات الأكثر إقبالاً اليوم
                const response = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${apiKey}&language=ar`);
                const data = await response.json();
                displayMovies(data.results);
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        function displayMovies(items) {
            grid.innerHTML = '';
            items.forEach(item => {
                const title = item.title || item.name;
                const releaseDate = item.release_date || item.first_air_date || 'قريباً';
                const year = releaseDate.split('-')[0];
                const rating = item.vote_average ? item.vote_average.toFixed(1) : '7.5';
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';

                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <img src="${poster}" alt="${title}" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title" title="${title}">${title}</div>
                        <div class="movie-meta">
                            <span>${year}</span>
                            <span class="rating">⭐ ${rating}</span>
                        </div>
                    </div>
                `;
                
                // عند الضغط على أي فيلم يفتح قفل الـ CPA
                card.addEventListener('click', () => {
                    lockedTitle.innerText = `مشاهدة فيلم: ${title}`;
                    toggleLocker(true);
                });

                grid.appendChild(card);
            });
        }

        function toggleLocker(show) {
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // دالة يتم تشغيلها عند ضغط الزائر على زر المشاهدة داخل القفل
        function startCPALocker() {
            // استبدل الرابط أدناه برابط الـ Content Locker الخاص بك من شركة CPA (مثل CPABuild أو OGAds أو CPALead)
            window.location.href = "https://www.google.com"; 
        }

        // تشغيل الجلب عند تحميل الصفحة
        fetchContent();
    </script>
</body>
</html>
